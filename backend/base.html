<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Food Express{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="{{ body_class|default('') }}">
    <header class="site-header">
        <div class="container navbar">
            <a class="brand" href="/">Quick Bite
                <span class="brand-tag">Fast · Fresh · Flavor</span>
            </a>
            <nav class="nav-links" aria-label="Primary navigation">
                <a class="btn btn-ghost" href="/">Home</a>
                <a class="btn btn-ghost" href="/menu">Menu</a>
                <a class="btn btn-ghost" href="/reservation">Reservation</a>
                <a class="btn btn-ghost" href="/dashboard">Dashboard</a>
                <a class="btn btn-ghost" href="/admin">Admin</a>
                <a class="btn btn-ghost" href="/cart">Cart</a>
                <a class="btn btn-primary" href="/login">Login</a>
            </nav>
        </div>
    </header>

    <main class="container page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="container footer-note" aria-label="Restaurant address">
        <strong>Address:</strong> {{ RESTAURANT_ADDRESS }}
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
